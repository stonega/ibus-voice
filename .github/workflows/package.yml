name: Package

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            deb_arch: amd64
            rpm_arch: x86_64
            node_arch: x64
            runner: ubuntu-latest
          - arch: aarch64
            deb_arch: arm64
            rpm_arch: aarch64
            node_arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build Debian package
        run: ./scripts/build-deb.sh
        env:
          TARGET_DEB_ARCH: ${{ matrix.deb_arch }}
          TARGET_NODE_ARCH: ${{ matrix.node_arch }}

      - name: Build RPM package
        run: ./scripts/build-rpm.sh
        env:
          TARGET_RPM_ARCH: ${{ matrix.rpm_arch }}
          TARGET_NODE_ARCH: ${{ matrix.node_arch }}

      - name: Verify Debian package architecture
        run: |
          version="$(python3 -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])')"
          pkg=".dist/packages/ibus-voice_${version}_${{ matrix.deb_arch }}.deb"
          test "$(dpkg-deb -f "$pkg" Architecture)" = "${{ matrix.deb_arch }}"

      - name: Verify RPM package architecture
        run: |
          version="$(python3 -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])')"
          pkg=".dist/packages/ibus-voice-${version}-1.${{ matrix.rpm_arch }}.rpm"
          test "$(rpm -qp --queryformat '%{ARCH}' "$pkg")" = "${{ matrix.rpm_arch }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ibus-voice-packages-${{ matrix.arch }}
          path: .dist/packages/*
          if-no-files-found: error
          compression-level: 0

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ibus-voice-packages-*
          path: .dist/release
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: .dist/release/*
          generate_release_notes: true
