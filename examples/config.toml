[provider]
name = "openai"
api_key = "replace-me"
model = "gpt-4o-transcribe"
timeout_seconds = 30
dictionary_path = "dictionary.txt"

[history]
path = "history.db"

[cleanup]
enabled = false
base_url = "https://api.openai.com/v1"
api_key = "replace-me"
model = "gpt-4o-mini"
timeout_seconds = 8
dictionary_path = "dictionary.txt"
system_prompt_path = "system_prompt.txt"
user_prompt_path = "user_prompt.txt"

[audio]
sample_rate = 16000
channels = 1
chunk_size = 1024
sample_width = 2

[hotkey]
key = "space"
modifiers = ["Control"]
